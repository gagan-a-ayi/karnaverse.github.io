<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KarnaVerse — Discover Karnataka, Your Way</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="KARNAVERSE-DATASET.js"></script>
<style>
:root {
  --color-primary: #4f46e5;
  --color-secondary: #06b6d4;
  --color-tertiary: #7c3aed;
  --color-success: #10b981;
  --color-danger: #f43f5e;
  --color-warning: #f59e0b;
  --color-text: #e2e8f0;
  --color-muted: #94a3b8;
  --color-bg: #0f0f1a;
  --surface-card: rgba(22,22,42,0.78);
  --surface-overlay: rgba(79,70,229,0.18);
  --surface-input: rgba(255,255,255,0.05);
  --gradient-primary: linear-gradient(135deg, #4f46e5, #06b6d4);
  --gradient-secondary: linear-gradient(135deg, #7c3aed, #4f46e5);
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-xl: 30px;
  --radius-2xl: 40px;
  --font-body: 'Inter', sans-serif;
  --font-display: 'Plus Jakarta Sans', sans-serif;
  --transition-fast: all 0.15s ease;
  --transition-base: all 0.2s ease;
  --transition-spring: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--color-bg);
  color:var(--color-text);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.68;
  overflow-x:hidden;
  min-height:100vh;
}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:rgba(79,70,229,0.35);border-radius:4px;}

/* === AMBIENT ORBS === */
.orbs-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.32;animation:orbDrift ease-in-out infinite alternate;}
.orb-1{width:420px;height:420px;background:radial-gradient(circle,#4f46e5,transparent 70%);top:-120px;left:-100px;animation-duration:9s;animation-delay:-2s;}
.orb-2{width:320px;height:320px;background:radial-gradient(circle,#06b6d4,transparent 70%);bottom:-80px;right:-60px;animation-duration:11s;animation-delay:-5s;}
.orb-3{width:260px;height:260px;background:radial-gradient(circle,#f43f5e,transparent 70%);top:40%;left:60%;animation-duration:13s;animation-delay:-3s;}
.orb-4{width:200px;height:200px;background:radial-gradient(circle,#7c3aed,transparent 70%);top:20%;right:20%;animation-duration:15s;animation-delay:-7s;}

@keyframes orbDrift{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(30px,20px) scale(1.1);}
}
@keyframes popIn{
  from{opacity:0;transform:scale(0.8) translateY(10px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
@keyframes springBounce{
  0%{transform:scale(1);}
  40%{transform:scale(0.85);}
  70%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.6;transform:scale(0.8);}
}
@keyframes pulseDot{
  0%,100%{box-shadow:0 0 8px #4ade80,0 0 16px rgba(74,222,128,0.6);}
  50%{box-shadow:0 0 4px #4ade80,0 0 8px rgba(74,222,128,0.3);}
}
@keyframes toastIn{
  from{opacity:0;transform:translateY(20px) scale(0.9);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes slideInRight{
  from{transform:translateX(100%);}
  to{transform:translateX(0);}
}

/* === LAYOUT === */
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
.main-layout{display:flex;flex:1;max-width:1600px;margin:0 auto;width:100%;padding:0 16px 32px;gap:20px;}
.content-area{flex:1;min-width:0;}

/* === HEADER === */
header{
  background:rgba(15,15,26,0.9);
  backdrop-filter:blur(28px);
  border-bottom:1.5px solid rgba(79,70,229,0.2);
  padding:16px 24px;
  position:sticky;top:0;z-index:50;
}
.header-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.logo{
  font-family:var(--font-display);
  font-weight:800;
  font-size:22px;
  letter-spacing:-0.3px;
  background:var(--gradient-primary);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  white-space:nowrap;
}
.tagline{color:var(--color-muted);font-size:12px;display:none;}
@media(min-width:768px){.tagline{display:block;}}

.search-wrap{flex:1;min-width:200px;max-width:360px;position:relative;}
.search-wrap input{
  width:100%;
  background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(79,70,229,0.25);
  border-radius:30px;
  color:var(--color-text);
  font-family:var(--font-body);
  font-size:13px;
  padding:10px 18px 10px 42px;
  outline:none;
  transition:var(--transition-base);
}
.search-wrap input::placeholder{color:var(--color-muted);}
.search-wrap input:focus{
  border-color:var(--color-primary);
  box-shadow:0 0 0 3px rgba(79,70,229,0.18);
}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--color-muted);font-size:16px;pointer-events:none;}

.header-actions{display:flex;align-items:center;gap:10px;margin-left:auto;}
.live-badge{
  background:rgba(74,222,128,0.18);
  border:1.5px solid rgba(74,222,128,0.7);
  border-radius:20px;
  color:#fff;
  font-size:11px;
  font-weight:700;
  padding:4px 10px;
  letter-spacing:0.5px;
  display:flex;align-items:center;gap:6px;
}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:pulseDot 2s ease-in-out infinite;}
.count-chip{
  background:rgba(79,70,229,0.2);
  border:1px solid rgba(79,70,229,0.4);
  border-radius:20px;
  color:#a5b4fc;
  font-size:11px;font-weight:700;
  padding:4px 10px;
}
.region-select{
  background:rgba(255,255,255,0.05);
  border:1.5px solid rgba(79,70,229,0.3);
  border-radius:20px;
  color:var(--color-text);
  font-size:12px;font-family:var(--font-body);
  padding:6px 12px;
  outline:none;cursor:pointer;
  transition:var(--transition-base);
}
.region-select:focus{border-color:var(--color-primary);}

.sidebar-toggle{
  background:rgba(79,70,229,0.2);
  border:1.5px solid rgba(79,70,229,0.4);
  border-radius:12px;
  color:#a5b4fc;
  font-size:18px;
  padding:6px 12px;
  cursor:pointer;
  transition:var(--transition-base);
  display:none;
}
.sidebar-toggle:hover{background:rgba(79,70,229,0.35);}
@media(max-width:900px){.sidebar-toggle{display:block;}}

/* === TRAVEL MODE STRIP === */
.mode-strip-wrap{
  background:rgba(15,15,26,0.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(79,70,229,0.15);
  padding:10px 24px;
  overflow-x:auto;
  scrollbar-width:none;
}
.mode-strip-wrap::-webkit-scrollbar{display:none;}
.mode-strip{display:flex;gap:8px;white-space:nowrap;}
.mode-tab{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(79,70,229,0.25);
  border-radius:20px;
  color:var(--color-muted);
  font-size:12px;font-weight:600;
  padding:7px 14px;
  cursor:pointer;
  transition:var(--transition-base);
  white-space:nowrap;
}
.mode-tab:hover{background:rgba(79,70,229,0.2);color:var(--color-text);}
.mode-tab.active{
  background:var(--gradient-primary);
  border-color:transparent;
  color:#fff;
  box-shadow:0 2px 12px rgba(79,70,229,0.4);
}

/* === TYPE FILTERS === */
.filter-bar{padding:12px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.type-chip{
  background:rgba(79,70,229,0.1);
  border:1px solid rgba(79,70,229,0.3);
  border-radius:20px;
  color:#a5b4fc;
  font-size:11.5px;font-weight:600;
  padding:5px 12px;
  cursor:pointer;
  transition:var(--transition-base);
  letter-spacing:0.3px;
}
.type-chip:hover{background:rgba(79,70,229,0.25);color:#fff;transform:translateY(-1px);}
.type-chip.active{
  background:rgba(79,70,229,0.4);
  border-color:var(--color-primary);
  color:#fff;
  box-shadow:0 2px 10px rgba(79,70,229,0.3);
}
.sort-select{
  margin-left:auto;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(79,70,229,0.25);
  border-radius:20px;
  color:var(--color-text);
  font-size:12px;font-family:var(--font-body);
  padding:6px 12px;
  outline:none;cursor:pointer;
}
.clear-btn{
  background:rgba(244,63,94,0.1);
  border:1px solid rgba(244,63,94,0.3);
  border-radius:20px;
  color:#fca5a5;
  font-size:11px;font-weight:600;
  padding:5px 12px;
  cursor:pointer;
  transition:var(--transition-base);
}
.clear-btn:hover{background:rgba(244,63,94,0.25);color:#fff;}

/* === RESULTS INFO === */
.results-info{color:var(--color-muted);font-size:12.5px;margin-bottom:12px;}
.results-info span{color:var(--color-secondary);font-weight:700;}

/* === CARDS GRID === */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
@media(max-width:1100px){.cards-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:680px){.cards-grid{grid-template-columns:1fr;}}

/* === DESTINATION CARD === */
.dest-card{
  background:var(--surface-card);
  border:1.5px solid rgba(79,70,229,0.22);
  border-radius:var(--radius-2xl);
  box-shadow:8px 8px 0px rgba(79,70,229,0.15),0 20px 50px rgba(0,0,0,0.4);
  backdrop-filter:blur(28px);
  overflow:hidden;
  transition:transform 0.2s ease,box-shadow 0.2s ease;
  animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
.dest-card:hover{
  transform:translateY(-4px);
  box-shadow:8px 12px 0px rgba(79,70,229,0.25),0 30px 60px rgba(0,0,0,0.5);
}

.card-thumbnail{
  height:120px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
  font-size:52px;
}
.card-thumb-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent) 0%,rgba(15,15,26,0.6) 100%);
  opacity:0.85;
}
.card-thumb-emoji{position:relative;z-index:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));}
.card-badges{
  position:absolute;top:10px;right:10px;
  display:flex;flex-direction:column;gap:5px;align-items:flex-end;z-index:2;
}
.badge-top-pick{
  background:rgba(6,182,212,0.3);
  border:1.5px solid rgba(6,182,212,0.8);
  border-radius:10px;
  color:#fff;
  font-size:9px;font-weight:800;
  padding:3px 7px;
  letter-spacing:0.5px;
  box-shadow:0 0 12px rgba(6,182,212,0.5);
}
.badge-permit{
  background:rgba(244,63,94,0.25);
  border:1.5px solid rgba(244,63,94,0.7);
  border-radius:10px;
  color:#fff;
  font-size:9px;font-weight:800;
  padding:3px 7px;
  letter-spacing:0.5px;
  box-shadow:0 0 10px rgba(244,63,94,0.4);
}
.match-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(15,15,26,0.75);
  border:1px solid rgba(79,70,229,0.5);
  border-radius:10px;
  color:#a5b4fc;
  font-size:10px;font-weight:700;
  padding:3px 8px;
  backdrop-filter:blur(8px);
  z-index:2;
}

.card-body{padding:14px 16px 12px;}
.card-name{
  font-family:var(--font-display);
  font-weight:800;
  font-size:16px;
  letter-spacing:-0.3px;
  margin-bottom:2px;
}
.card-location{color:var(--color-muted);font-size:11px;margin-bottom:10px;}

.chips-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.micro-chip{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:12px;
  font-size:10.5px;font-weight:600;
  padding:3px 9px;
  letter-spacing:0.3px;
}
.chip-season{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:#fcd34d;}
.chip-distance{background:rgba(6,182,212,0.12);border:1px solid rgba(6,182,212,0.35);color:#67e8f9;}
.chip-mode{background:rgba(79,70,229,0.12);border:1px solid rgba(79,70,229,0.3);color:#a5b4fc;}
.chip-tag{background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);color:#c4b5fd;}
.diff-badge-easy{background:rgba(16,185,129,0.18);border:1px solid rgba(16,185,129,0.5);color:#6ee7b7;border-radius:12px;font-size:10px;font-weight:700;padding:2px 8px;}
.diff-badge-moderate{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:#fcd34d;border-radius:12px;font-size:10px;font-weight:700;padding:2px 8px;}
.diff-badge-hard{background:rgba(244,63,94,0.15);border:1px solid rgba(244,63,94,0.4);color:#fca5a5;border-radius:12px;font-size:10px;font-weight:700;padding:2px 8px;}

.booking-status-chip{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:12px;
  font-size:10px;font-weight:600;
  padding:3px 9px;
}
.status-open{background:rgba(16,185,129,0.18);border:1px solid rgba(16,185,129,0.5);color:#6ee7b7;}
.status-closed{background:rgba(244,63,94,0.15);border:1px solid rgba(244,63,94,0.4);color:#fca5a5;}
.status-full{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:#fcd34d;}
.status-unknown{background:rgba(148,163,184,0.1);border:1px solid rgba(148,163,184,0.3);color:#94a3b8;}

.card-desc{color:#cbd5e1;font-size:12.5px;line-height:1.6;margin:8px 0 10px;}

.why-visit{
  background:rgba(79,70,229,0.08);
  border-left:3px solid rgba(79,70,229,0.5);
  border-radius:0 8px 8px 0;
  padding:7px 11px;
  color:#a5b4fc;
  font-size:12px;
  font-style:italic;
  margin-bottom:10px;
}
.why-visit strong{font-style:normal;color:var(--color-secondary);}

.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}

/* === CARD ACTIONS === */
.card-actions{display:flex;gap:7px;flex-wrap:wrap;}
.btn-primary{
  background:var(--gradient-primary);
  border:none;
  border-radius:var(--radius-md);
  color:#fff;
  font-weight:600;
  font-size:12px;
  padding:8px 16px;
  box-shadow:3px 3px 0 rgba(79,70,229,0.35);
  transition:transform 0.15s,box-shadow 0.15s;
  cursor:pointer;
  font-family:var(--font-body);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:3px 5px 0 rgba(79,70,229,0.45);}
.btn-primary:active{animation:springBounce 0.35s cubic-bezier(0.34,1.56,0.64,1);}

.btn-ghost{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(79,70,229,0.4);
  border-radius:20px;
  color:#a5b4fc;
  font-size:12px;font-weight:600;
  padding:7px 14px;
  transition:var(--transition-base);
  cursor:pointer;
  font-family:var(--font-body);
}
.btn-ghost:hover{background:rgba(79,70,229,0.25);border-color:var(--color-primary);color:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,0.3);}
.btn-ghost:active{animation:springBounce 0.35s cubic-bezier(0.34,1.56,0.64,1);}
.btn-ghost.saved{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.5);color:#6ee7b7;}

.btn-cyan{
  background:rgba(6,182,212,0.1);
  border:1px solid rgba(6,182,212,0.4);
  border-radius:20px;
  color:#67e8f9;
  font-size:12px;font-weight:600;
  padding:7px 14px;
  transition:var(--transition-base);
  cursor:pointer;
  font-family:var(--font-body);
}
.btn-cyan:hover{background:rgba(6,182,212,0.25);border-color:var(--color-secondary);color:#fff;transform:translateY(-1px);}

/* === REFERENCES ACCORDION === */
.accordion{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height 0.35s ease,opacity 0.35s ease;
}
.accordion.open{max-height:600px;opacity:1;}
.accordion-inner{border-top:1px solid rgba(79,70,229,0.2);padding:12px 16px 14px;margin-top:4px;}
.acc-section-title{
  font-size:11px;font-weight:700;
  color:#a5b4fc;
  text-transform:uppercase;
  letter-spacing:0.8px;
  margin-bottom:8px;
}
.ref-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.ref-chip{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:12px;
  font-size:11px;font-weight:600;
  padding:4px 10px;
  text-decoration:none;
  transition:var(--transition-base);
  cursor:pointer;
}
.ref-indigo{background:rgba(79,70,229,0.15);border:1px solid rgba(79,70,229,0.4);color:#a5b4fc;}
.ref-indigo:hover{background:rgba(79,70,229,0.3);color:#fff;}
.ref-cyan{background:rgba(6,182,212,0.12);border:1px solid rgba(6,182,212,0.4);color:#67e8f9;}
.ref-cyan:hover{background:rgba(6,182,212,0.25);color:#fff;}
.ref-violet{background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.35);color:#c4b5fd;}
.ref-violet:hover{background:rgba(124,58,237,0.25);color:#fff;}
.ref-emerald{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.35);color:#6ee7b7;}
.ref-emerald:hover{background:rgba(16,185,129,0.25);color:#fff;}

.permit-panel{
  background:rgba(244,63,94,0.07);
  border:1px solid rgba(244,63,94,0.3);
  border-radius:var(--radius-md);
  padding:12px 14px;
  margin-top:4px;
}
.permit-header{font-weight:700;color:#fca5a5;font-size:12.5px;margin-bottom:6px;}
.permit-authority{color:var(--color-muted);font-size:11.5px;margin-bottom:4px;}
.permit-notes{color:#cbd5e1;font-size:11.5px;margin-bottom:10px;line-height:1.5;}
.permit-actions{display:flex;gap:7px;flex-wrap:wrap;}
.btn-rose{
  background:rgba(244,63,94,0.15);
  border:1px solid rgba(244,63,94,0.45);
  border-radius:20px;
  color:#fca5a5;
  font-size:11px;font-weight:600;
  padding:6px 13px;
  text-decoration:none;
  transition:var(--transition-base);
  cursor:pointer;
  font-family:var(--font-body);
}
.btn-rose:hover{background:rgba(244,63,94,0.3);color:#fff;transform:translateY(-1px);}
.btn-permit-primary{
  background:var(--gradient-primary);
  border:none;
  border-radius:20px;
  color:#fff;
  font-size:11px;font-weight:600;
  padding:6px 13px;
  text-decoration:none;
  cursor:pointer;
  font-family:var(--font-body);
}

/* === SIDEBAR === */
.sidebar{
  width:290px;
  flex-shrink:0;
  position:sticky;
  top:80px;
  height:calc(100vh - 100px);
  overflow-y:auto;
}
.sidebar-panel{
  background:var(--surface-card);
  border:1.5px solid rgba(79,70,229,0.25);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(20px);
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}
.sidebar-title{
  font-family:var(--font-display);
  font-weight:800;
  font-size:14px;
  background:var(--gradient-primary);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.sidebar-title span{
  background:none;
  -webkit-text-fill-color:var(--color-text);
  font-size:16px;
}
.sidebar-stat{
  display:flex;justify-content:space-between;
  padding:7px 0;
  border-bottom:1px solid rgba(79,70,229,0.12);
  font-size:12.5px;
}
.sidebar-stat:last-child{border-bottom:none;}
.sidebar-stat .label{color:var(--color-muted);}
.sidebar-stat .value{color:var(--color-secondary);font-weight:700;}

<script>
// ============================================================
// STATE
// ============================================================
let state = {
  activeMode: '',
  activeTypes: [],
  activeRegion: '',
  searchQuery: '',
  sortBy: 'match',
  showPermitOnly: false,
  savedIds: new Set(),
  bookingStatuses: {} // id -> status string
};

const DEST_DATA = KARNAVERSE_DATA;

// Update total count chip
document.getElementById('totalCount').textContent = DEST_DATA.length + ' Destinations';

// ============================================================
// FILTERING & SORTING
// ============================================================
function calcMatch(dest) {
  let score = 0, total = 0;
  if (state.activeMode) {
    total++;
    if (dest.travelModes.includes(state.activeMode)) score++;
  }
  if (state.activeTypes.length > 0) {
    total += state.activeTypes.length;
    state.activeTypes.forEach(t => {
      if (dest.type.some(dt => dt.toLowerCase().includes(t.toLowerCase()))) score++;
    });
  }
  if (state.activeRegion) {
    total++;
    if (dest.region === state.activeRegion) score++;
  }
  if (total === 0) return 100;
  return Math.round((score / total) * 100);
}

function filterAndSort() {
  let results = DEST_DATA.filter(dest => {
    if (state.activeMode && !dest.travelModes.includes(state.activeMode)) return false;
    if (state.activeTypes.length > 0) {
      const hasType = state.activeTypes.some(t =>
        dest.type.some(dt => dt.toLowerCase().includes(t.toLowerCase()))
      );
      if (!hasType) return false;
    }
    if (state.activeRegion && dest.region !== state.activeRegion) return false;
    if (state.showPermitOnly && !dest.requiresBooking) return false;
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      if (!dest.name.toLowerCase().includes(q) &&
          !dest.district.toLowerCase().includes(q) &&
          !dest.region.toLowerCase().includes(q) &&
          !dest.tags.join(' ').toLowerCase().includes(q) &&
          !dest.description.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  results = results.map(d => ({...d, _match: calcMatch(d)}));

  if (state.sortBy === 'match') results.sort((a,b) => b._match - a._match || b.popularity - a.popularity);
  else if (state.sortBy === 'distance') results.sort((a,b) => a.distanceFromBengaluru - b.distanceFromBengaluru);
  else if (state.sortBy === 'popularity') results.sort((a,b) => b.popularity - a.popularity);
  else if (state.sortBy === 'alpha') results.sort((a,b) => a.name.localeCompare(b.name));

  return results;
}

// ============================================================
// RENDER CARDS
// ============================================================
function getDiffBadge(d) {
  if (d === 'Easy') return '<span class="diff-badge-easy">🟢 Easy</span>';
  if (d === 'Moderate') return '<span class="diff-badge-moderate">🟡 Moderate</span>';
  return '<span class="diff-badge-hard">🔴 Hard</span>';
}

function getWhyVisit(dest) {
  const tips = {
    'Nature': 'immerse in Karnataka\'s stunning natural beauty',
    'Historic': 'step back through centuries of rich history',
    'Wildlife': 'encounter incredible wildlife in their natural habitat',
    'Devotional': 'experience profound spiritual energy',
    'Adventure': 'push your limits with thrilling adventures',
    'Cultural': 'soak in authentic Karnataka culture',
    'Waterfalls': 'witness Karnataka\'s spectacular cascades',
    'Culinary': 'taste authentic Karnataka flavors',
    'Educational': 'learn from living history and heritage',
    'Photography': 'capture frames that last a lifetime'
  };
  const tip = tips[dest.type[0]] || 'discover Karnataka\'s hidden treasures';
  if (dest.topPick) return `<strong>✦ Top Pick:</strong> ${tip}. With ${dest.popularity}% visitor approval, this is a must-visit.`;
  return `<strong>💡 Ideal for:</strong> Travellers who want to ${tip}. Best visited in ${dest.bestSeason}.`;
}

function getStatusHtml(destId) {
  const status = state.bookingStatuses[destId];
  if (!status) return '';
  if (status === 'open') return '<span class="booking-status-chip status-open">🟢 Booking Open</span>';
  if (status === 'closed') return '<span class="booking-status-chip status-closed">🔴 Currently Closed</span>';
  if (status === 'full') return '<span class="booking-status-chip status-full">🟡 Quota Full</span>';
  return '<span class="booking-status-chip status-unknown">⚪ Check Official Site</span>';
}

function renderCard(dest, idx) {
  const isSaved = state.savedIds.has(dest.id);
  const matchPct = dest._match ?? 100;
  const hasActiveFilter = state.activeMode || state.activeTypes.length || state.activeRegion || state.searchQuery;

  const modeChips = dest.travelModes.slice(0,4).map(m => `<span class="micro-chip chip-mode">${m}</span>`).join('');
  const tagChips = dest.tags.slice(0,4).map(t => `<span class="micro-chip chip-tag">${t}</span>`).join('');

  const refLinks = [];
  if (dest.links.karnatakaTourism) refLinks.push(`<a href="${dest.links.karnatakaTourism}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-indigo">🌐 Karnataka Tourism</a>`);
  if (dest.links.wikipedia) refLinks.push(`<a href="${dest.links.wikipedia}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-indigo">📋 Wikipedia</a>`);
  if (dest.links.googleMaps) refLinks.push(`<a href="${dest.links.googleMaps}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-cyan">🗺️ Google Maps</a>`);
  if (dest.links.photography) refLinks.push(`<a href="${dest.links.photography}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-violet">📸 Photo Guide</a>`);
  if (dest.links.forestDept) refLinks.push(`<a href="${dest.links.forestDept}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-emerald">🌲 Forest Dept</a>`);

  const permitSection = dest.requiresBooking ? `
    <div class="permit-panel">
      <div class="permit-header">⚠️ Advance Permit / Booking Required</div>
      <div class="permit-authority">${dest.permitAuthority || 'See official site'}</div>
      <div class="permit-notes">${dest.permitNotes || ''}</div>
      <div class="permit-actions">
        <a href="${dest.permitUrl || dest.officialUrl}" target="_blank" rel="noopener noreferrer" class="btn-permit-primary">Apply for Permit →</a>
        ${dest.availabilityUrl ? `<a href="${dest.availabilityUrl}" target="_blank" rel="noopener noreferrer" class="btn-rose">Check Availability</a>` : ''}
        <button class="btn-rose" onclick="openModal('${dest.name}',${JSON.stringify(dest.officialUrl).replace(/'/g,"&#39;")})">ℹ️ Live Info</button>
      </div>
    </div>` : '';

  return `
    <div class="dest-card" id="card-${dest.id}" style="animation-delay:${idx*0.06}s; --accent:${dest.accentColor}">
      <div class="card-thumbnail" style="--accent-color:${dest.accentColor}">
        <div class="card-thumb-bg" style="background:linear-gradient(135deg,${dest.accentColor}88,rgba(15,15,26,0.7))"></div>
        <div class="card-thumb-emoji">${dest.emoji}</div>
        <div class="card-badges">
          ${dest.topPick ? '<div class="badge-top-pick">✦ TOP PICK</div>' : ''}
          ${dest.requiresBooking ? '<div class="badge-permit">⚠️ PERMIT REQ\'D</div>' : ''}
        </div>
        ${hasActiveFilter ? `<div class="match-badge">${matchPct}% match</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-name">${dest.name}</div>
        <div class="card-location">📍 ${dest.district} · ${dest.region}</div>
        <div class="chips-row">
          <span class="micro-chip chip-season">📅 ${dest.bestSeason}</span>
          <span class="micro-chip chip-distance">🛣️ ${dest.distanceFromBengaluru} km</span>
          ${getDiffBadge(dest.difficulty)}
          ${dest.requiresBooking ? getStatusHtml(dest.id) : ''}
        </div>
        <div class="chips-row">${modeChips}</div>
        <p class="card-desc">${dest.description}</p>
        <div class="why-visit">${getWhyVisit(dest)}</div>
        <div class="tags-row">${tagChips}</div>
        <div class="card-actions">
          <button class="btn-primary" onclick="planTrip(${dest.id})">🗺️ Plan Trip</button>
          <button class="btn-ghost ${isSaved ? 'saved' : ''}" id="save-btn-${dest.id}" onclick="toggleSave(${dest.id})">${isSaved ? '✓ Saved' : '♡ Save'}</button>
          <button class="btn-cyan" onclick="toggleAccordion(${dest.id})">🔗 Info & Links</button>
        </div>
      </div>
      <div class="accordion" id="acc-${dest.id}">
        <div class="accordion-inner">
          <div class="acc-section-title">A) Official References</div>
          <div class="ref-chips">${refLinks.join('')}</div>
          ${dest.requiresBooking ? '<div class="acc-section-title">B) Permit & Booking Portal</div>' + permitSection : ''}
        </div>
      </div>
    </div>`;
}

function renderCards() {
  const results = filterAndSort();
  const grid = document.getElementById('cardsGrid');
  document.getElementById('resultsCount').textContent = results.length;

  if (results.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1">
      <div class="no-results-emoji">🗺️</div>
      <h3>No destinations found</h3>
      <p>Try adjusting your filters or search query</p>
    </div>`;
    return;
  }

  grid.innerHTML = results.map((d,i) => renderCard(d,i)).join('');
}

// ============================================================
// ACCORDION
// ============================================================
function toggleAccordion(id) {
  const acc = document.getElementById(`acc-${id}`);
  acc.classList.toggle('open');
}

// ============================================================
// SAVE / TRIP BUILDER
// ============================================================
function toggleSave(id) {
  if (state.savedIds.has(id)) {
    state.savedIds.delete(id);
    showToast('Destination removed from trip', 'danger');
  } else {
    state.savedIds.add(id);
    showToast('Destination added to trip! 🗺️', 'success');
  }
  updateSaveBtn(id);
  renderSidebar();
}

function updateSaveBtn(id) {
  const btn = document.getElementById(`save-btn-${id}`);
  if (!btn) return;
  if (state.savedIds.has(id)) {
    btn.textContent = '✓ Saved';
    btn.classList.add('saved');
  } else {
    btn.textContent = '♡ Save';
    btn.classList.remove('saved');
  }
}

function renderSidebar() {
  const savedArr = Array.from(state.savedIds).map(id => DEST_DATA.find(d => d.id === id)).filter(Boolean);
  const listEl = document.getElementById('savedList');
  const statsEl = document.getElementById('tripStats');
  const stylePanel = document.getElementById('stylePanel');
  const permitPanel = document.getElementById('permitChecklistPanel');

  if (savedArr.length === 0) {
    listEl.innerHTML = '<div class="empty-saved">💡 Save destinations to build your trip</div>';
    statsEl.style.display = 'none';
    stylePanel.style.display = 'none';
    permitPanel.style.display = 'none';
    return;
  }

  listEl.innerHTML = '<ul class="saved-list">' +
    savedArr.map(d => `
      <li class="saved-item">
        <span>${d.emoji}</span>
        <span class="name">${d.name}</span>
        <span style="color:var(--color-muted);font-size:11px;">${d.distanceFromBengaluru}km</span>
        <button class="remove-btn" onclick="toggleSave(${d.id})">✕</button>
      </li>`).join('') + '</ul>';

  const totalDist = savedArr.reduce((s,d) => s+d.distanceFromBengaluru, 0);
  const duration = Math.max(1, Math.ceil(savedArr.length / 2));
  document.getElementById('totalDist').textContent = totalDist + ' km';
  document.getElementById('tripDuration').textContent = duration + ' day' + (duration>1?'s':'');
  statsEl.style.display = 'block';

  // Style breakdown
  const typeCounts = {};
  savedArr.forEach(d => d.type.forEach(t => { typeCounts[t] = (typeCounts[t]||0)+1; }));
  const total = Object.values(typeCounts).reduce((a,b)=>a+b,0);
  const colors = {Nature:'#10b981',Historic:'#f59e0b',Wildlife:'#10b981',Cultural:'#7c3aed',Adventure:'#f43f5e',Devotional:'#4f46e5',Waterfalls:'#06b6d4',Culinary:'#f59e0b',Educational:'#7c3aed'};
  const styleBar = document.getElementById('styleBar');
  const legend = document.getElementById('styleLegend');
  styleBar.innerHTML = Object.entries(typeCounts).map(([t,c]) =>
    `<div class="style-seg" style="width:${(c/total*100).toFixed(1)}%;background:${colors[t]||'#94a3b8'};"></div>`
  ).join('');
  legend.innerHTML = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([t,c]) =>
    `<span style="color:${colors[t]||'#94a3b8'};margin-right:8px;">${t} ${(c/total*100).toFixed(0)}%</span>`
  ).join('');
  stylePanel.style.display = 'block';

  // Permit checklist
  const permReq = savedArr.filter(d => d.requiresBooking);
  if (permReq.length > 0) {
    document.getElementById('permitChecklist').innerHTML = permReq.map(d =>
      `<div class="permit-check-item">⚠️ <a href="${d.permitUrl}" target="_blank" rel="noopener noreferrer">${d.name}</a></div>`
    ).join('');
    permitPanel.style.display = 'block';
  } else {
    permitPanel.style.display = 'none';
  }
}

function planTrip(id) {
  const dest = DEST_DATA.find(d => d.id === id);
  if (!dest) return;
  const url = dest.links.googleMaps || dest.officialUrl;
  window.open(url, '_blank', 'noopener noreferrer');

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type='success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ============================================================
// EXPORT / SHARE
// ============================================================
function getTripSummary() {
  const savedArr = Array.from(state.savedIds).map(id => DEST_DATA.find(d => d.id === id)).filter(Boolean);
  if (!savedArr.length) return 'No destinations saved yet.';
  const totalDist = savedArr.reduce((s,d) => s+d.distanceFromBengaluru,0);
  const duration = Math.max(1, Math.ceil(savedArr.length/2));
  let txt = `🧭 KarnaVerse Trip Plan\n${'='.repeat(40)}\n\n`;
  savedArr.forEach((d,i) => {
    txt += `${i+1}. ${d.emoji} ${d.name}\n`;
    txt += `   District: ${d.district} | Region: ${d.region}\n`;
    txt += `   Distance: ${d.distanceFromBengaluru} km | Best Season: ${d.bestSeason}\n`;
    txt += `   Difficulty: ${d.difficulty}\n`;
    if (d.requiresBooking) txt += `   ⚠️ PERMIT REQUIRED: ${d.permitUrl}\n`;
    txt += `   🌐 ${d.officialUrl}\n\n`;
  });
  txt += `${'='.repeat(40)}\n`;
  txt += `Total Distance: ${totalDist} km\n`;
  txt += `Suggested Duration: ${duration} day${duration>1?'s':''}\n`;
  return txt;
}
function exportTrip() {
  const txt = getTripSummary();
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'karnaverse-trip.txt';
  a.click();
  showToast('Trip exported! 📥');
}
function copyTrip() {
  const txt = getTripSummary();
  navigator.clipboard.writeText(txt).then(() => showToast('Trip copied to clipboard! 📋'));
}

// ============================================================
// LIVE BOOKING STATUS FETCH
// ============================================================
async function fetchBookingStatus(dest) {
  if (!dest.requiresBooking) return;
  const proxy = 'https://corsproxy.io/?';
  try {
    const res = await Promise.race([
      fetch(proxy + encodeURIComponent(dest.permitUrl)),
      new Promise((_,reject) => setTimeout(()=>reject('timeout'),5000))
    ]);
    const text = await res.text();
    const lower = text.toLowerCase();
    let status = 'unknown';
    if (lower.includes('closed') || lower.includes('suspended')) status = 'closed';
    else if (lower.includes('quota full') || lower.includes('not available')) status = 'full';
    else if (lower.includes('open') || lower.includes('available') || lower.includes('book')) status = 'open';
    state.bookingStatuses[dest.id] = status;
    // Update only the status chip in the DOM
    const card = document.getElementById(`card-${dest.id}`);
    if (card) {
      const chipsRow = card.querySelector('.chips-row');
      if (chipsRow) {
        const existing = chipsRow.querySelector('.booking-status-chip');
        const newChip = document.createElement('span');
        const statusHtml = getStatusHtml(dest.id);
        if (statusHtml) {
          if (existing) existing.outerHTML = statusHtml;
          else chipsRow.insertAdjacentHTML('beforeend', statusHtml);
        }
      }
    }
  } catch {
    state.bookingStatuses[dest.id] = 'unknown';
  }
}

function fetchAllStatuses() {
  DEST_DATA.filter(d => d.requiresBooking).forEach(d => fetchBookingStatus(d));
}

// ============================================================
// FILTER EVENTS
// ============================================================
document.getElementById('modeStrip').addEventListener('click', e => {
  const btn = e.target.closest('.mode-tab');
  if (!btn) return;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.activeMode = btn.dataset.mode;
  renderCards();
});

document.getElementById('filterBar').addEventListener('click', e => {
  const chip = e.target.closest('.type-chip');
  if (!chip) return;
  const type = chip.dataset.type;
  if (type === '') {
    state.activeTypes = [];
    document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
    document.querySelector('.type-chip[data-type=""]').classList.add('active');
  } else {
    document.querySelector('.type-chip[data-type=""]').classList.remove('active');
    if (chip.classList.contains('active')) {
      chip.classList.remove('active');
      state.activeTypes = state.activeTypes.filter(t => t !== type);
      if (state.activeTypes.length === 0) {
        document.querySelector('.type-chip[data-type=""]').classList.add('active');
      }
    } else {
      chip.classList.add('active');
      state.activeTypes.push(type);
    }
  }
  renderCards();
});

document.getElementById('regionSelect').addEventListener('change', e => {
  state.activeRegion = e.target.value;
  renderCards();
});

document.getElementById('searchInput').addEventListener('input', e => {
  state.searchQuery = e.target.value;
  renderCards();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  state.sortBy = e.target.value;
  renderCards();
});

function clearAllFilters() {
  state.activeMode = '';
  state.activeTypes = [];
  state.activeRegion = '';
  state.searchQuery = '';
  state.sortBy = 'match';
  state.showPermitOnly = false;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  document.querySelector('.mode-tab[data-mode=""]').classList.add('active');
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.type-chip[data-type=""]').classList.add('active');
  document.getElementById('regionSelect').value = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'match';
  document.getElementById('permitToggle').classList.remove('on');
  renderCards();
  showToast('Filters cleared! 🔄');
}

function togglePermitFilter() {
  state.showPermitOnly = !state.showPermitOnly;
  document.getElementById('permitToggle').classList.toggle('on', state.showPermitOnly);
  renderCards();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
