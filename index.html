<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KarnaVerse — Discover Karnataka, Your Way</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="KARNAVERSE-DATASET.js"></script>
<link href="style.css" rel="stylesheet"/>
</head>
<body>
<div class="orbs-container">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<div id="app">
  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">🧭 KarnaVerse</div>
      <div class="tagline">Discover Karnataka, Your Way</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search destinations, tags..." />
      </div>
      <div class="header-actions">
        <div class="live-badge"><div class="status-dot"></div> LIVE</div>
        <div class="count-chip" id="totalCount">52 Destinations</div>
        <select class="region-select" id="regionSelect">
          <option value="">All Regions</option>
          <option value="North Karnataka">North Karnataka</option>
          <option value="South Karnataka">South Karnataka</option>
          <option value="Coastal Karnataka">Coastal Karnataka</option>
          <option value="Malnad">Malnad</option>
          <option value="Deccan Plateau">Deccan Plateau</option>
          <option value="Hyderabad-Karnataka">Hyderabad-Karnataka</option>
        </select>
        <button class="sidebar-toggle" onclick="toggleSidebar()">🗂️</button>
      </div>
    </div>
  </header>

  <!-- TRAVEL MODE STRIP -->
  <div class="mode-strip-wrap">
    <div class="mode-strip" id="modeStrip">
      <button class="mode-tab active" data-mode="">🗺️ All Modes</button>
      <button class="mode-tab" data-mode="Road Trip">🚗 Road Trip</button>
      <button class="mode-tab" data-mode="Bike Riding">🏍️ Bike Riding</button>
      <button class="mode-tab" data-mode="Photography">📸 Photography</button>
      <button class="mode-tab" data-mode="Trekking">🥾 Trekking</button>
      <button class="mode-tab" data-mode="Camping">⛺ Camping</button>
      <button class="mode-tab" data-mode="Group Tour">🚌 Group Tour</button>
      <button class="mode-tab" data-mode="Train Journey">🚂 Train Journey</button>
      <button class="mode-tab" data-mode="Waterway">🛶 Waterway</button>
    </div>
  </div>

  <div class="main-layout">
    <!-- CONTENT AREA -->
    <div class="content-area">
      <!-- TYPE FILTERS -->
      <div class="filter-bar" id="filterBar">
        <button class="type-chip active" data-type="">🏷️ All Types</button>
        <button class="type-chip" data-type="Devotional">🛕 Devotional</button>
        <button class="type-chip" data-type="Nature">🌿 Nature</button>
        <button class="type-chip" data-type="Adventure">🧗 Adventure</button>
        <button class="type-chip" data-type="Historic">🏛️ Historic</button>
        <button class="type-chip" data-type="Educational">🎓 Educational</button>
        <button class="type-chip" data-type="Business">💼 Business</button>
        <button class="type-chip" data-type="Cultural">🎭 Cultural</button>
        <button class="type-chip" data-type="Culinary">🍽️ Culinary</button>
        <button class="type-chip" data-type="Waterfalls">🌊 Waterfalls</button>
        <button class="type-chip" data-type="Wildlife">🐘 Wildlife</button>
        <select class="sort-select" id="sortSelect">
          <option value="match">Match Score</option>
          <option value="distance">Distance</option>
          <option value="popularity">Popularity</option>
          <option value="alpha">Alphabetical</option>

        <button class="clear-btn" onclick="clearAllFilters()">✕ Clear All</button>

      <div class="results-info">Showing <span id="resultsCount">0</span> destinations</div>

    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-panel">
        <div class="sidebar-title"><span>🗂️</span> Trip Builder</div>
        <div class="toggle-wrap">
          <div class="toggle" id="permitToggle" onclick="togglePermitFilter()"></div>
          <span class="toggle-label">Show only permit-required</span>
        </div>
        <div id="savedList"><div class="empty-saved">💡 Save destinations to build your trip</div></div>
        <div id="tripStats" style="display:none;">
          <div class="sidebar-stat"><span class="label">Total Distance</span><span class="value" id="totalDist">—</span></div>
          <div class="sidebar-stat"><span class="label">Suggested Duration</span><span class="value" id="tripDuration">—</span></div>
        </div>
      </div>

      <div class="sidebar-panel" id="stylePanel" style="display:none;">
        <div class="sidebar-title"><span>📊</span> Trip Style</div>
        <div class="style-bar" id="styleBar"></div>
        <div id="styleLegend" style="font-size:11px;color:var(--color-muted);"></div>
      </div>

      <div class="sidebar-panel" id="permitChecklistPanel" style="display:none;">
        <div class="sidebar-title"><span>⚠️</span> Permit Checklist</div>
        <div class="permit-checklist" id="permitChecklist"></div>
      </div>

      <div class="sidebar-panel">
        <div class="sidebar-actions">
          <button class="btn-ghost" onclick="exportTrip()">📥 Export Trip (.txt)</button>
          <button class="btn-ghost" onclick="copyTrip()">📋 Share Trip</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Live Info</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="modalIframe" src="" title="Live Info"></iframe>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// STATE
// ============================================================
let state = {
  activeMode: '',
  activeTypes: [],
  activeRegion: '',
  searchQuery: '',
  sortBy: 'match',
  showPermitOnly: false,
  savedIds: new Set(),
  bookingStatuses: {} // id -> status string
};

const DEST_DATA = KARNAVERSE_DATA;

// Update total count chip
document.getElementById('totalCount').textContent = DEST_DATA.length + ' Destinations';

// ============================================================
// FILTERING & SORTING
// ============================================================
function calcMatch(dest) {
  let score = 0, total = 0;
  if (state.activeMode) {
    total++;
    if (dest.travelModes.includes(state.activeMode)) score++;
  }
  if (state.activeTypes.length > 0) {
    total += state.activeTypes.length;
    state.activeTypes.forEach(t => {
      if (dest.type.some(dt => dt.toLowerCase().includes(t.toLowerCase()))) score++;
    });
  }
  if (state.activeRegion) {
    total++;
    if (dest.region === state.activeRegion) score++;
  }
  if (total === 0) return 100;
  return Math.round((score / total) * 100);
}

function filterAndSort() {
  let results = DEST_DATA.filter(dest => {
    if (state.activeMode && !dest.travelModes.includes(state.activeMode)) return false;
    if (state.activeTypes.length > 0) {
      const hasType = state.activeTypes.some(t =>
        dest.type.some(dt => dt.toLowerCase().includes(t.toLowerCase()))
      );
      if (!hasType) return false;
    }
    if (state.activeRegion && dest.region !== state.activeRegion) return false;
    if (state.showPermitOnly && !dest.requiresBooking) return false;
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      if (!dest.name.toLowerCase().includes(q) &&
          !dest.district.toLowerCase().includes(q) &&
          !dest.region.toLowerCase().includes(q) &&
          !dest.tags.join(' ').toLowerCase().includes(q) &&
          !dest.description.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  results = results.map(d => ({...d, _match: calcMatch(d)}));

  if (state.sortBy === 'match') results.sort((a,b) => b._match - a._match || b.popularity - a.popularity);
  else if (state.sortBy === 'distance') results.sort((a,b) => a.distanceFromBengaluru - b.distanceFromBengaluru);
  else if (state.sortBy === 'popularity') results.sort((a,b) => b.popularity - a.popularity);
  else if (state.sortBy === 'alpha') results.sort((a,b) => a.name.localeCompare(b.name));

  return results;
}

// ============================================================
// RENDER CARDS
// ============================================================
function getDiffBadge(d) {
  if (d === 'Easy') return '<span class="diff-badge-easy">🟢 Easy</span>';
  if (d === 'Moderate') return '<span class="diff-badge-moderate">🟡 Moderate</span>';
  return '<span class="diff-badge-hard">🔴 Hard</span>';
}

function getWhyVisit(dest) {
  const tips = {
    'Nature': 'immerse in Karnataka\'s stunning natural beauty',
    'Historic': 'step back through centuries of rich history',
    'Wildlife': 'encounter incredible wildlife in their natural habitat',
    'Devotional': 'experience profound spiritual energy',
    'Adventure': 'push your limits with thrilling adventures',
    'Cultural': 'soak in authentic Karnataka culture',
    'Waterfalls': 'witness Karnataka\'s spectacular cascades',
    'Culinary': 'taste authentic Karnataka flavors',
    'Educational': 'learn from living history and heritage',
    'Photography': 'capture frames that last a lifetime'
  };
  const tip = tips[dest.type[0]] || 'discover Karnataka\'s hidden treasures';
  if (dest.topPick) return `<strong>✦ Top Pick:</strong> ${tip}. With ${dest.popularity}% visitor approval, this is a must-visit.`;
  return `<strong>💡 Ideal for:</strong> Travellers who want to ${tip}. Best visited in ${dest.bestSeason}.`;
}

function getStatusHtml(destId) {
  const status = state.bookingStatuses[destId];
  if (!status) return '';
  if (status === 'open') return '<span class="booking-status-chip status-open">🟢 Booking Open</span>';
  if (status === 'closed') return '<span class="booking-status-chip status-closed">🔴 Currently Closed</span>';
  if (status === 'full') return '<span class="booking-status-chip status-full">🟡 Quota Full</span>';
  return '<span class="booking-status-chip status-unknown">⚪ Check Official Site</span>';
}

function renderCard(dest, idx) {
  const isSaved = state.savedIds.has(dest.id);
  const matchPct = dest._match ?? 100;
  const hasActiveFilter = state.activeMode || state.activeTypes.length || state.activeRegion || state.searchQuery;

  const modeChips = dest.travelModes.slice(0,4).map(m => `<span class="micro-chip chip-mode">${m}</span>`).join('');
  const tagChips = dest.tags.slice(0,4).map(t => `<span class="micro-chip chip-tag">${t}</span>`).join('');

  const refLinks = [];
  if (dest.links.karnatakaTourism) refLinks.push(`<a href="${dest.links.karnatakaTourism}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-indigo">🌐 Karnataka Tourism</a>`);
  if (dest.links.wikipedia) refLinks.push(`<a href="${dest.links.wikipedia}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-indigo">📋 Wikipedia</a>`);
  if (dest.links.googleMaps) refLinks.push(`<a href="${dest.links.googleMaps}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-cyan">🗺️ Google Maps</a>`);
  if (dest.links.photography) refLinks.push(`<a href="${dest.links.photography}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-violet">📸 Photo Guide</a>`);
  if (dest.links.forestDept) refLinks.push(`<a href="${dest.links.forestDept}" target="_blank" rel="noopener noreferrer" class="ref-chip ref-emerald">🌲 Forest Dept</a>`);

  const permitSection = dest.requiresBooking ? `
    <div class="permit-panel">
      <div class="permit-header">⚠️ Advance Permit / Booking Required</div>
      <div class="permit-authority">${dest.permitAuthority || 'See official site'}</div>
      <div class="permit-notes">${dest.permitNotes || ''}</div>
      <div class="permit-actions">
        <a href="${dest.permitUrl || dest.officialUrl}" target="_blank" rel="noopener noreferrer" class="btn-permit-primary">Apply for Permit →</a>
        ${dest.availabilityUrl ? `<a href="${dest.availabilityUrl}" target="_blank" rel="noopener noreferrer" class="btn-rose">Check Availability</a>` : ''}
        <button class="btn-rose" onclick="openModal('${dest.name}',${JSON.stringify(dest.officialUrl).replace(/'/g,"&#39;")})">ℹ️ Live Info</button>
      </div>
    </div>` : '';

  return `
    <div class="dest-card" id="card-${dest.id}" style="animation-delay:${idx*0.06}s; --accent:${dest.accentColor}">
      <div class="card-thumbnail" style="--accent-color:${dest.accentColor}">
        <div class="card-thumb-bg" style="background:linear-gradient(135deg,${dest.accentColor}88,rgba(15,15,26,0.7))"></div>
        <div class="card-thumb-emoji">${dest.emoji}</div>
        <div class="card-badges">
          ${dest.topPick ? '<div class="badge-top-pick">✦ TOP PICK</div>' : ''}
          ${dest.requiresBooking ? '<div class="badge-permit">⚠️ PERMIT REQ\'D</div>' : ''}
        </div>
        ${hasActiveFilter ? `<div class="match-badge">${matchPct}% match</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-name">${dest.name}</div>
        <div class="card-location">📍 ${dest.district} · ${dest.region}</div>
        <div class="chips-row">
          <span class="micro-chip chip-season">📅 ${dest.bestSeason}</span>
          <span class="micro-chip chip-distance">🛣️ ${dest.distanceFromBengaluru} km</span>
          ${getDiffBadge(dest.difficulty)}
          ${dest.requiresBooking ? getStatusHtml(dest.id) : ''}
        </div>
        <div class="chips-row">${modeChips}</div>
        <p class="card-desc">${dest.description}</p>
        <div class="why-visit">${getWhyVisit(dest)}</div>
        <div class="tags-row">${tagChips}</div>
        <div class="card-actions">
          <button class="btn-primary" onclick="planTrip(${dest.id})">🗺️ Plan Trip</button>
          <button class="btn-ghost ${isSaved ? 'saved' : ''}" id="save-btn-${dest.id}" onclick="toggleSave(${dest.id})">${isSaved ? '✓ Saved' : '♡ Save'}</button>
          <button class="btn-cyan" onclick="toggleAccordion(${dest.id})">🔗 Info & Links</button>
        </div>
      </div>
      <div class="accordion" id="acc-${dest.id}">
        <div class="accordion-inner">
          <div class="acc-section-title">A) Official References</div>
          <div class="ref-chips">${refLinks.join('')}</div>
          ${dest.requiresBooking ? '<div class="acc-section-title">B) Permit & Booking Portal</div>' + permitSection : ''}
        </div>
      </div>
    </div>`;
}

function renderCards() {
  const results = filterAndSort();
  const grid = document.getElementById('cardsGrid');
  document.getElementById('resultsCount').textContent = results.length;

  if (results.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1">
      <div class="no-results-emoji">🗺️</div>
      <h3>No destinations found</h3>
      <p>Try adjusting your filters or search query</p>
    </div>`;
    return;
  }

  grid.innerHTML = results.map((d,i) => renderCard(d,i)).join('');
}

// ============================================================
// ACCORDION
// ============================================================
function toggleAccordion(id) {
  const acc = document.getElementById(`acc-${id}`);
  acc.classList.toggle('open');
}

// ============================================================
// SAVE / TRIP BUILDER
// ============================================================
function toggleSave(id) {
  if (state.savedIds.has(id)) {
    state.savedIds.delete(id);
    showToast('Destination removed from trip', 'danger');
  } else {
    state.savedIds.add(id);
    showToast('Destination added to trip! 🗺️', 'success');
  }
  updateSaveBtn(id);
  renderSidebar();
}

function updateSaveBtn(id) {
  const btn = document.getElementById(`save-btn-${id}`);
  if (!btn) return;
  if (state.savedIds.has(id)) {
    btn.textContent = '✓ Saved';
    btn.classList.add('saved');
  } else {
    btn.textContent = '♡ Save';
    btn.classList.remove('saved');
  }
}

function renderSidebar() {
  const savedArr = Array.from(state.savedIds).map(id => DEST_DATA.find(d => d.id === id)).filter(Boolean);
  const listEl = document.getElementById('savedList');
  const statsEl = document.getElementById('tripStats');
  const stylePanel = document.getElementById('stylePanel');
  const permitPanel = document.getElementById('permitChecklistPanel');

  if (savedArr.length === 0) {
    listEl.innerHTML = '<div class="empty-saved">💡 Save destinations to build your trip</div>';
    statsEl.style.display = 'none';
    stylePanel.style.display = 'none';
    permitPanel.style.display = 'none';
    return;
  }

  listEl.innerHTML = '<ul class="saved-list">' +
    savedArr.map(d => `
      <li class="saved-item">
        <span>${d.emoji}</span>
        <span class="name">${d.name}</span>
        <span style="color:var(--color-muted);font-size:11px;">${d.distanceFromBengaluru}km</span>
        <button class="remove-btn" onclick="toggleSave(${d.id})">✕</button>
      </li>`).join('') + '</ul>';

  const totalDist = savedArr.reduce((s,d) => s+d.distanceFromBengaluru, 0);
  const duration = Math.max(1, Math.ceil(savedArr.length / 2));
  document.getElementById('totalDist').textContent = totalDist + ' km';
  document.getElementById('tripDuration').textContent = duration + ' day' + (duration>1?'s':'');
  statsEl.style.display = 'block';

  // Style breakdown
  const typeCounts = {};
  savedArr.forEach(d => d.type.forEach(t => { typeCounts[t] = (typeCounts[t]||0)+1; }));
  const total = Object.values(typeCounts).reduce((a,b)=>a+b,0);
  const colors = {Nature:'#10b981',Historic:'#f59e0b',Wildlife:'#10b981',Cultural:'#7c3aed',Adventure:'#f43f5e',Devotional:'#4f46e5',Waterfalls:'#06b6d4',Culinary:'#f59e0b',Educational:'#7c3aed'};
  const styleBar = document.getElementById('styleBar');
  const legend = document.getElementById('styleLegend');
  styleBar.innerHTML = Object.entries(typeCounts).map(([t,c]) =>
    `<div class="style-seg" style="width:${(c/total*100).toFixed(1)}%;background:${colors[t]||'#94a3b8'};"></div>`
  ).join('');
  legend.innerHTML = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([t,c]) =>
    `<span style="color:${colors[t]||'#94a3b8'};margin-right:8px;">${t} ${(c/total*100).toFixed(0)}%</span>`
  ).join('');
  stylePanel.style.display = 'block';

  // Permit checklist
  const permReq = savedArr.filter(d => d.requiresBooking);
  if (permReq.length > 0) {
    document.getElementById('permitChecklist').innerHTML = permReq.map(d =>
      `<div class="permit-check-item">⚠️ <a href="${d.permitUrl}" target="_blank" rel="noopener noreferrer">${d.name}</a></div>`
    ).join('');
    permitPanel.style.display = 'block';
  } else {
    permitPanel.style.display = 'none';
  }
}

// ============================================================
// MODAL
// ============================================================
function openModal(name, url) {
  document.getElementById('modalTitle').textContent = '🌐 Live Info — ' + name;
  document.getElementById('modalIframe').src = url;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalIframe').src = '';
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
// PLAN TRIP
// ============================================================
function planTrip(id) {
  const dest = DEST_DATA.find(d => d.id === id);
  if (!dest) return;
  const url = dest.links.googleMaps || dest.officialUrl;
  window.open(url, '_blank', 'noopener noreferrer');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type='success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ============================================================
// EXPORT / SHARE
// ============================================================
function getTripSummary() {
  const savedArr = Array.from(state.savedIds).map(id => DEST_DATA.find(d => d.id === id)).filter(Boolean);
  if (!savedArr.length) return 'No destinations saved yet.';
  const totalDist = savedArr.reduce((s,d) => s+d.distanceFromBengaluru,0);
  const duration = Math.max(1, Math.ceil(savedArr.length/2));
  let txt = `🧭 KarnaVerse Trip Plan\n${'='.repeat(40)}\n\n`;
  savedArr.forEach((d,i) => {
    txt += `${i+1}. ${d.emoji} ${d.name}\n`;
    txt += `   District: ${d.district} | Region: ${d.region}\n`;
    txt += `   Distance: ${d.distanceFromBengaluru} km | Best Season: ${d.bestSeason}\n`;
    txt += `   Difficulty: ${d.difficulty}\n`;
    if (d.requiresBooking) txt += `   ⚠️ PERMIT REQUIRED: ${d.permitUrl}\n`;
    txt += `   🌐 ${d.officialUrl}\n\n`;
  });
  txt += `${'='.repeat(40)}\n`;
  txt += `Total Distance: ${totalDist} km\n`;
  txt += `Suggested Duration: ${duration} day${duration>1?'s':''}\n`;
  return txt;
}
function exportTrip() {
  const txt = getTripSummary();
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'karnaverse-trip.txt';
  a.click();
  showToast('Trip exported! 📥');
}
function copyTrip() {
  const txt = getTripSummary();
  navigator.clipboard.writeText(txt).then(() => showToast('Trip copied to clipboard! 📋'));
}

// ============================================================
// LIVE BOOKING STATUS FETCH
// ============================================================
async function fetchBookingStatus(dest) {
  if (!dest.requiresBooking) return;
  const proxy = 'https://corsproxy.io/?';
  try {
    const res = await Promise.race([
      fetch(proxy + encodeURIComponent(dest.permitUrl)),
      new Promise((_,reject) => setTimeout(()=>reject('timeout'),5000))
    ]);
    const text = await res.text();
    const lower = text.toLowerCase();
    let status = 'unknown';
    if (lower.includes('closed') || lower.includes('suspended')) status = 'closed';
    else if (lower.includes('quota full') || lower.includes('not available')) status = 'full';
    else if (lower.includes('open') || lower.includes('available') || lower.includes('book')) status = 'open';
    state.bookingStatuses[dest.id] = status;
    // Update only the status chip in the DOM
    const card = document.getElementById(`card-${dest.id}`);
    if (card) {
      const chipsRow = card.querySelector('.chips-row');
      if (chipsRow) {
        const existing = chipsRow.querySelector('.booking-status-chip');
        const newChip = document.createElement('span');
        const statusHtml = getStatusHtml(dest.id);
        if (statusHtml) {
          if (existing) existing.outerHTML = statusHtml;
          else chipsRow.insertAdjacentHTML('beforeend', statusHtml);
        }
      }
    }
  } catch {
    state.bookingStatuses[dest.id] = 'unknown';
  }
}

function fetchAllStatuses() {
  DEST_DATA.filter(d => d.requiresBooking).forEach(d => fetchBookingStatus(d));
}

// ============================================================
// FILTER EVENTS
// ============================================================
document.getElementById('modeStrip').addEventListener('click', e => {
  const btn = e.target.closest('.mode-tab');
  if (!btn) return;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.activeMode = btn.dataset.mode;
  renderCards();
});

document.getElementById('filterBar').addEventListener('click', e => {
  const chip = e.target.closest('.type-chip');
  if (!chip) return;
  const type = chip.dataset.type;
  if (type === '') {
    state.activeTypes = [];
    document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
    document.querySelector('.type-chip[data-type=""]').classList.add('active');
  } else {
    document.querySelector('.type-chip[data-type=""]').classList.remove('active');
    if (chip.classList.contains('active')) {
      chip.classList.remove('active');
      state.activeTypes = state.activeTypes.filter(t => t !== type);
      if (state.activeTypes.length === 0) {
        document.querySelector('.type-chip[data-type=""]').classList.add('active');
      }
    } else {
      chip.classList.add('active');
      state.activeTypes.push(type);
    }
  }
  renderCards();
});

document.getElementById('regionSelect').addEventListener('change', e => {
  state.activeRegion = e.target.value;
  renderCards();
});

document.getElementById('searchInput').addEventListener('input', e => {
  state.searchQuery = e.target.value;
  renderCards();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  state.sortBy = e.target.value;
  renderCards();
});

function clearAllFilters() {
  state.activeMode = '';
  state.activeTypes = [];
  state.activeRegion = '';
  state.searchQuery = '';
  state.sortBy = 'match';
  state.showPermitOnly = false;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  document.querySelector('.mode-tab[data-mode=""]').classList.add('active');
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.type-chip[data-type=""]').classList.add('active');
  document.getElementById('regionSelect').value = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'match';
  document.getElementById('permitToggle').classList.remove('on');
  renderCards();
  showToast('Filters cleared! 🔄');
}

function togglePermitFilter() {
  state.showPermitOnly = !state.showPermitOnly;
  document.getElementById('permitToggle').classList.toggle('on', state.showPermitOnly);
  renderCards();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// INIT
// ============================================================
renderCards();
renderSidebar();
// Fetch statuses after initial render
setTimeout(fetchAllStatuses, 500);
</script>
